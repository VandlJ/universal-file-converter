# Nginx config for the Hetzner VPS host (NOT the Docker container).
# This handles TLS termination and proxies to the frontend container on :3000.
#
# Setup:
#   1. Install: apt install nginx certbot python3-certbot-nginx
#   2. Copy this file to /etc/nginx/sites-available/converter
#   3. ln -s /etc/nginx/sites-available/converter /etc/nginx/sites-enabled/
#   4. Replace converter.yourdomain.com with your actual domain
#   5. Run: certbot --nginx -d converter.yourdomain.com
#   6. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name converter.yourdomain.com;
    # certbot will add the redirect to HTTPS automatically
}

server {
    listen 443 ssl;
    server_name converter.yourdomain.com;

    # Managed by certbot
    ssl_certificate     /etc/letsencrypt/live/converter.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/converter.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large file uploads (must match MAX_FILE_SIZE in docker-compose.prod.yml)
    client_max_body_size 110m;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

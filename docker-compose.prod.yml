# Production compose — pulls pre-built images from ghcr.io.
# Requires a .env file on the server (never committed to the repo):
#
#   REDIS_PASSWORD=<strong random password>
#   HMAC_SECRET=<python3 -c "import secrets; print(secrets.token_hex(32))">
#   ALLOWED_ORIGINS=https://converter.yourdomain.com
#   TESSERACT_LANGUAGES=ces+eng+deu
#   CLEANUP_INTERVAL_SECONDS=3600
#   MAX_FILE_SIZE=104857600

services:

  frontend:
    image: ghcr.io/vandlj/universal-file-converter-frontend:latest
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - converter-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  backend:
    image: ghcr.io/vandlj/universal-file-converter-backend:latest
    ports:
      - "8000:8000"
    volumes:
      - tmp_data:/tmp/converter
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - converter-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 1536M

  redis:
    image: redis:7-alpine
    # No ports exposed in production — accessible only within converter-net.
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    networks:
      - converter-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

networks:
  converter-net:
    driver: bridge

volumes:
  tmp_data:
  redis_data:

server {
    # Non-root nginx runs on 8080 (no CAP_NET_BIND_SERVICE needed).
    listen 8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from error pages and headers.
    server_tokens off;

    # --- Security headers ---
    add_header X-Frame-Options           "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options    "nosniff"                               always;
    add_header X-XSS-Protection          "1; mode=block"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"       always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # --- Gzip compression ---
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/wasm;

    # --- Static asset caching ---
    location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- API proxy → backend service ---
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        # Do not buffer large file uploads/downloads.
        proxy_request_buffering  off;
        proxy_buffering          off;
    }

    # --- SPA fallback: all unknown paths serve index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}

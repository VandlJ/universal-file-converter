name: CI

on:
  push:
    branches: ["dev", "vandl"]
  pull_request:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Backend lint — ruff catches syntax and import errors fast
  # ──────────────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check ./backend --select E9,F --output-format=github

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Frontend lint + TypeScript type-check
  # ──────────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: TypeScript type-check
        working-directory: ./frontend
        run: npx tsc -b --noEmit

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Docker dry-run — verify Dockerfiles build without errors
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker dry-run builds
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: false

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Backend tests — placeholder until pytest suite exists
  # ──────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    needs: [backend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Tests placeholder
        # TODO: replace with `pytest backend/tests/ -v` once test suite exists
        run: echo "No automated tests yet — pytest suite to be added."

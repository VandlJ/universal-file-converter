name: CI

on:
  push:
    branches: ["dev", "vandl"]
  pull_request:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Backend lint — ruff catches syntax and import errors fast
  # ──────────────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check ./backend --select E9,F --output-format=github

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Frontend lint + TypeScript type-check
  # ──────────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: TypeScript type-check
        working-directory: ./frontend
        run: npx tsc -b --noEmit

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Backend tests — pytest with mocked Redis, real libmagic
  # ──────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    needs: [backend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      # libmagic1: required by python-magic at runtime
      # Other system libs (pandoc, libreoffice, tesseract) are NOT needed
      # because no real conversions are executed in unit tests.
      - name: Install system dependencies
        run: sudo apt-get install -y libmagic1

      - name: Install Python dependencies
        working-directory: ./backend
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: ./backend
        run: pytest -v --tb=short
        env:
          HMAC_SECRET: ci-test-secret-key
          REDIS_URL: redis://localhost:6379/0
          ALLOWED_ORIGINS: http://localhost:3000

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Frontend tests — Vitest in jsdom (no browser / no system deps needed)
  # ──────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    needs: [frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Vitest
        working-directory: ./frontend
        run: npm run test:run

  # ──────────────────────────────────────────────────────────────────────────
  # 5. E2E tests — Playwright in real Chromium + WebKit at mobile viewports
  # ──────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      # Install only the browsers used in playwright.config.ts
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium webkit

      - name: Build frontend (required by `npm run preview`)
        working-directory: ./frontend
        run: npm run build

      - name: Run Playwright tests
        working-directory: ./frontend
        run: npx playwright test

      # Always upload the HTML report so failed tests can be debugged
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # 6. Docker dry-run — verify Dockerfiles build without errors
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker dry-run builds
    runs-on: ubuntu-latest
    needs: [backend-tests, e2e-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: false

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - tmp_data:/tmp/converter
    environment:
      - MAX_FILE_SIZE=104857600
      - CLEANUP_INTERVAL_SECONDS=3600
      - TESSERACT_LANGUAGES=ces+eng+deu
      - ALLOWED_ORIGINS=http://localhost:3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  tmp_data:
